name: CI/CD Pipeline

# Define environment variables available to all jobs
env:
  APP_NAME: fribbe-status-checker
  PYTHON_VERSION: '3.11'
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    # Job-level environment variables
    env:
      TEST_ENV: 'testing'
      DEBUG: 'true'
      # Test-specific overrides
      LOCAL_DATA_PATH: ${{ github.workspace }}/dev-data
      SESSION_SECRET_KEY: github-actions-test-key
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r dev-requirements.txt
          pip install pytest-github-actions-annotate-failures

      - name: Run tests
        run: |
          # Load test environment variables
          if [ -f .env.test ]; then
            export $(cat .env.test | grep -v '^#' | xargs)
          fi
          # Run pytest with JUnit XML report
          pytest tests/ --junitxml=junit/test-results.xml --verbose

      - name: Upload test results
        if: always()  # Run even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: junit/test-results.xml

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v3
        if: always()  # Run even if tests fail
        with:
          report_paths: 'junit/test-results.xml'
          detailed_summary: true
          include_passed: true

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:buildcache,mode=max
          # Pass build args to Dockerfile
          build-args: |
            APP_ENV=production
            BUILD_VERSION=${{ github.sha }}