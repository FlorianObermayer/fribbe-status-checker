name: CI/CD Pipeline

# Define environment variables available to all jobs
env:
  PYTHON_VERSION: '3.12'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Prevent parallel deploy pipelines from conflicting on image tags / releases
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Install Node dependencies
        run: npm ci
      - name: Lint
        run: uv run lint
      - name: Check licenses.json is up-to-date
        run: |
          uv run generate-licenses
          if ! git diff --quiet app/licenses.json; then
            echo "::error::app/licenses.json is out of date. Run 'uv run generate-licenses' locally and commit the result."
            git diff app/licenses.json
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Install Node dependencies
        run: npm ci
      - name: Test with pytest
        run: uv run pytest tests/ --junitxml=junit/test-results.xml --cov=app --cov-report=xml --cov-report=html --cov-fail-under=80
      - name: Diff-cover
        if: github.event_name == 'pull_request'
        run: uv run diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=80 --json-report diff-coverage.json
      - name: Global coverage data
        if: (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') && !cancelled()
        id: coverage
        uses: MishaKav/pytest-coverage-comment@v1.7.1
        with:
          pytest-xml-coverage-path: coverage.xml
          junitxml-path: junit/test-results.xml
          hide-comment: true
      - name: Coverage PR comment
        if: github.event_name == 'pull_request' && !cancelled()
        uses: actions/github-script@v9
        env:
          SUMMARY_REPORT: ${{ steps.coverage.outputs.summaryReport }}
          GLOBAL_PCT: ${{ steps.coverage.outputs.coverage }}
          GLOBAL_COLOR: ${{ steps.coverage.outputs.color }}
        with:
          script: |
            const script = require('./.github/scripts/coverage-comment.js')
            await script({github, context})
      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && !cancelled()
        uses: Schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.COVERAGE_GIST_ID }}
          filename: fribbe-coverage.json
          label: Coverage
          message: ${{ steps.coverage.outputs.coverage }}
          color: ${{ steps.coverage.outputs.color }}

  build-and-push:
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_version: ${{ steps.version.outputs.build_version }}
      is_new_version: ${{ steps.check_tag.outputs.is_new_version }}
    
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=${VERSION}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Normalize image repository to lowercase
        run: echo "IMAGE_REPO=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Check if version tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "is_new_version=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_new_version=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute image tags
        id: tags
        run: |
          TAGS="${IMAGE_REPO}:${{ steps.version.outputs.build_version }}"
          if [ "${{ steps.check_tag.outputs.is_new_version }}" = "true" ]; then
            TAGS="${TAGS},${IMAGE_REPO}:${{ steps.version.outputs.version }}"
            TAGS="${TAGS},${IMAGE_REPO}:latest"
          else
            TAGS="${TAGS},${IMAGE_REPO}:nightly"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.build_version }}

  release:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Normalize image repository to lowercase
        run: echo "IMAGE_REPO=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Generate changelog (stable — unreleased commits)
        if: needs.build-and-push.outputs.is_new_version == 'true'
        id: changelog-stable
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag v${{ needs.build-and-push.outputs.version }} --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}
          RELEASE_VERSION: v${{ needs.build-and-push.outputs.version }}

      - name: Generate changelog (nightly — since last tag)
        if: needs.build-and-push.outputs.is_new_version == 'false'
        id: changelog-nightly
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}
          RELEASE_VERSION: nightly

      # First push with a new version: create a stable release
      - name: Create release
        if: needs.build-and-push.outputs.is_new_version == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build-and-push.outputs.version }}
          name: v${{ needs.build-and-push.outputs.version }}
          body: |
            ## Docker Image

            ```
            docker pull ${{ env.IMAGE_REPO }}:${{ needs.build-and-push.outputs.version }}
            ```

            Build: `${{ needs.build-and-push.outputs.build_version }}`

            ## What's Changed

            ${{ steps.changelog-stable.outputs.content }}
          generate_release_notes: false

      - name: Delete nightly release after stable release
        if: needs.build-and-push.outputs.is_new_version == 'true'
        run: |
          gh release delete nightly --cleanup-tag --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Subsequent pushes under the same version: update rolling nightly pre-release
      - name: Move nightly tag to current commit
        if: needs.build-and-push.outputs.is_new_version == 'false'
        run: |
          git tag -f nightly
          git push origin -f nightly

      - name: Delete existing nightly release
        if: needs.build-and-push.outputs.is_new_version == 'false'
        run: gh release delete nightly --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        if: needs.build-and-push.outputs.is_new_version == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly (${{ needs.build-and-push.outputs.build_version }})
          prerelease: true
          make_latest: false
          body: |
            ## Nightly Build

            Automated build from `main` — not a stable release.

            ```
            docker pull ${{ env.IMAGE_REPO }}:${{ needs.build-and-push.outputs.build_version }}
            ```

            Base version: `${{ needs.build-and-push.outputs.version }}` | Build: `${{ needs.build-and-push.outputs.build_version }}` | Commit: ${{ github.sha }}

            ## Changes since v${{ needs.build-and-push.outputs.version }}

            ${{ steps.changelog-nightly.outputs.content }}
          generate_release_notes: false