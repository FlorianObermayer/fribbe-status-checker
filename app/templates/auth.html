<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Anmelden</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/auth.styles.css?v={{ version }}">
    <!-- Prevent flash of unstyled content when dark mode is active -->
    <script>
        (function () {
            var t = localStorage.getItem('theme');
            if (t === 'dark' || (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-mode');
            }
        }());
    </script>
</head>

<body data-next="{{ next_url }}" data-signed-in="{{ signed_in | tojson }}">
    <main class="auth-shell">
        <section class="auth-card">
            <button id="theme-toggle-btn" class="theme-toggle-btn" aria-label="Erscheinungsbild wechseln"
                title="Erscheinungsbild wechseln">
                <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
                <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
            <p class="eyebrow">Geschützter Bereich</p>
            <h1>Anmelden</h1>
            <p class="copy">Melde dich mit API-Schlüssel oder Admin-Token an. Der Browser speichert danach nur eine
                opaque Sitzungs-ID, nicht den Schlüssel selbst.</p>
    
            <form id="auth-form" novalidate>
                <label for="token-input">Schlüssel</label>
                <input id="token-input" name="token" type="password" autocomplete="current-password" spellcheck="false"
                    required>
                <p class="hint">Der Schlüssel wird nur zum Anmelden verwendet.</p>
                <p id="auth-error" class="error" hidden></p>
                <div class="actions">
                    <button id="auth-submit" class="primary" type="submit">Anmelden</button>
                    <a id="auth-cancel" class="link-button secondary" href="/">Abbrechen</a>
                </div>
            </form>
    
            <div id="signed-in-panel" class="signed-in-panel" hidden>
                <p class="copy">Für diesen Browser ist bereits eine gültige Sitzung vorhanden.</p>
                <div class="actions">
                    <button id="continue-button" class="primary" type="button">Weiter</button>
                    <button id="signout-button" class="secondary" type="button">Abmelden</button>
                </div>
            </div>
        </section>
    </main>
    <script src="/static/js/csrf.js?v={{ version }}"></script>
    <script src="/static/js/theme.js?v={{ version }}"></script>
    <script src="/static/js/auth.js?v={{ version }}"></script>
</body>

</html>
