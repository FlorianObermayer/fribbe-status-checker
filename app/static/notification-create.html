<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">

    <title>Notification Generator</title>
    <style>

    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/notification-create.styles.css">
</head>

<body>
    <h1>Fribbe - Nachricht erstellen</h1>
    <p>Erstelle ganz einfach Nachrichten, die dann auf der Status Seite für jeden angezeigt werden!</p>
    <div class="api-key-group">
        <div class="form-group">
            <label for="apiKey">API Schlüssel (benötigt, um Nachrichten zu erstellen - frag Flo, wenn du einen
                brauchst!)</label>
            <input type="text" id="apiKey" placeholder="Gebe deinen API Schlüssel ein...">
            <div class="form-group">
                <label>
                    <input type="checkbox" id="rememberMe" checked>
                    API-Schlüssel speichern (nur auf diesem Gerät)
                </label>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label for="message">Nachricht (unterstützt Markdown)</label>
        <textarea id="message" placeholder="Schreibe deine Nachricht..."></textarea>
    </div>

    <div class="form-group">
        <label for="validFrom">Gilt ab wann (optional)</label>
        <input type="datetime-local" id="validFrom">
    </div>

    <div class="form-group">
        <label for="validUntil">Gilt bis (optional)</label>
        <input type="datetime-local" id="validUntil">
    </div>

    <div class="form-group">
        <label>
            <input type="checkbox" id="enabled" checked>
            Aktiv
        </label>
    </div>

    <button id="submitBtn">Erstellen</button>

    <div id="result"></div>

    <script src="/static/js/notification-create.js"></script>

</body>

</html>
