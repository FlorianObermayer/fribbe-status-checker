<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">

    <title>Notification Generator</title>
    <link rel="stylesheet" href="/static/vendor/easymde/easymde.min.css">
    <script src="/static/vendor/easymde/easymde.min.js"></script>
    <link rel="stylesheet" href="/static/css/notification-create.styles.css">
</head>

<body>
    <h1>Fribbe - Nachricht erstellen</h1>
    <p>Erstelle Nachrichten, die auf der Status Seite angezeigt werden!</p>

    <div class="form-group">
        <label for="message">Nachricht (unterstützt Markdown)</label>
        <textarea id="message" placeholder="Schreibe deine Nachricht..."></textarea>
    </div>

    <div class="datetime-group">
        <div class="form-group">
            <label for="validFrom">Gilt ab (optional)</label>
            <input type="datetime-local" id="validFrom">
            </div>
        <div class="form-group">
            <label for="validUntil">Gilt bis (optional)</label>
            <input type="datetime-local" id="validUntil">
        </div>
    </div>

    <button id="submitBtn">Vorschau Erstellen</button>

    <div id="result"></div>

    <script src="/static/js/notification-create.js"></script>

</body>

</html>
