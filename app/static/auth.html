<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Anmelden</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3efe6;
            --card: rgba(255, 252, 246, 0.9);
            --line: rgba(33, 52, 71, 0.12);
            --text: #213447;
            --muted: #5d6b79;
            --accent: #bb5a2a;
            --accent-strong: #95441b;
            --danger-bg: #fce4dd;
            --danger-text: #7c2917;
            --shadow: 0 18px 40px rgba(33, 52, 71, 0.14);
        }
    
        * {
            box-sizing: border-box;
        }
    
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "Helvetica Neue", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(187, 90, 42, 0.18), transparent 28%),
                linear-gradient(160deg, #f8f3ea 0%, var(--bg) 46%, #e8dfd2 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }
    
        .auth-shell {
            width: min(100%, 420px);
        }
    
        .auth-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 28px;
            backdrop-filter: blur(12px);
        }
    
        .eyebrow {
            margin: 0 0 10px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent);
        }
    
        h1 {
            margin: 0;
            font-size: clamp(1.9rem, 5vw, 2.5rem);
            line-height: 1;
        }
    
        .copy {
            margin: 14px 0 0;
            color: var(--muted);
            line-height: 1.5;
        }
    
        form,
        .signed-in-panel {
            margin-top: 24px;
        }
    
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
    
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.85);
            font: inherit;
            color: inherit;
        }
    
        input:focus {
            outline: 2px solid rgba(187, 90, 42, 0.26);
            border-color: rgba(187, 90, 42, 0.56);
        }
    
        .hint {
            margin: 10px 0 0;
            font-size: 0.92rem;
            color: var(--muted);
        }
    
        .error {
            margin: 16px 0 0;
            padding: 12px 14px;
            border-radius: 12px;
            background: var(--danger-bg);
            color: var(--danger-text);
            font-size: 0.95rem;
        }
    
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 22px;
            flex-wrap: wrap;
        }
    
        button,
        .link-button {
            appearance: none;
            border: 0;
            border-radius: 999px;
            padding: 12px 18px;
            font: inherit;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: transform 140ms ease, opacity 140ms ease, background-color 140ms ease;
        }
    
        button:hover,
        .link-button:hover {
            transform: translateY(-1px);
        }
    
        button:disabled {
            cursor: wait;
            opacity: 0.7;
            transform: none;
        }
    
        .primary {
            background: var(--accent);
            color: #fff7f0;
        }
    
        .primary:hover {
            background: var(--accent-strong);
        }
    
        .secondary {
            background: rgba(33, 52, 71, 0.08);
            color: var(--text);
        }
    
        .secondary:hover {
            background: rgba(33, 52, 71, 0.14);
        }
    
        @media (max-width: 520px) {
            .auth-card {
                padding: 24px 20px;
                border-radius: 20px;
            }
    
            .actions {
                flex-direction: column;
            }
    
            button,
            .link-button {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

<body data-next="__NEXT_DATA__" data-signed-in="__SIGNED_IN__">
    <main class="auth-shell">
        <section class="auth-card">
            <p class="eyebrow">Geschützter Bereich</p>
            <h1>Anmelden</h1>
            <p class="copy">Melde dich mit API-Schlüssel oder Admin-Token an. Der Browser speichert danach nur eine
                opaque Sitzungs-ID, nicht den Schlüssel selbst.</p>
    
            <form id="auth-form" novalidate>
                <label for="token-input">Schlüssel</label>
                <input id="token-input" name="token" type="password" autocomplete="current-password" spellcheck="false"
                    required>
                <p class="hint">Der Schlüssel wird nur zum Anmelden verwendet.</p>
                <p id="auth-error" class="error" hidden></p>
                <div class="actions">
                    <button id="auth-submit" class="primary" type="submit">Anmelden</button>
                    <a id="auth-cancel" class="link-button secondary" href="/">Abbrechen</a>
                </div>
            </form>
    
            <div id="signed-in-panel" class="signed-in-panel" hidden>
                <p class="copy">Für diesen Browser ist bereits eine gültige Sitzung vorhanden.</p>
                <div class="actions">
                    <button id="continue-button" class="primary" type="button">Weiter</button>
                    <button id="signout-button" class="secondary" type="button">Abmelden</button>
                </div>
            </div>
        </section>
    </main>
    <script src="/static/js/auth.js?v=__VERSION__"></script>
</body>

</html>
