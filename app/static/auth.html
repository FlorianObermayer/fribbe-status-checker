<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Anmelden</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/auth.styles.css?v=__VERSION__">
</head>

<body data-next="__NEXT_DATA__" data-signed-in="__SIGNED_IN__">
    <main class="auth-shell">
        <section class="auth-card">
            <p class="eyebrow">Geschützter Bereich</p>
            <h1>Anmelden</h1>
            <p class="copy">Melde dich mit API-Schlüssel oder Admin-Token an. Der Browser speichert danach nur eine
                opaque Sitzungs-ID, nicht den Schlüssel selbst.</p>
    
            <form id="auth-form" novalidate>
                <label for="token-input">Schlüssel</label>
                <input id="token-input" name="token" type="password" autocomplete="current-password" spellcheck="false"
                    required>
                <p class="hint">Der Schlüssel wird nur zum Anmelden verwendet.</p>
                <p id="auth-error" class="error" hidden></p>
                <div class="actions">
                    <button id="auth-submit" class="primary" type="submit">Anmelden</button>
                    <a id="auth-cancel" class="link-button secondary" href="/">Abbrechen</a>
                </div>
            </form>
    
            <div id="signed-in-panel" class="signed-in-panel" hidden>
                <p class="copy">Für diesen Browser ist bereits eine gültige Sitzung vorhanden.</p>
                <div class="actions">
                    <button id="continue-button" class="primary" type="button">Weiter</button>
                    <button id="signout-button" class="secondary" type="button">Abmelden</button>
                </div>
            </div>
        </section>
    </main>
    <script src="/static/js/csrf.js?v=__VERSION__"></script>
    <script src="/static/js/auth.js?v=__VERSION__"></script>
</body>

</html>
