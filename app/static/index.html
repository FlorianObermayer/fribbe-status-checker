<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fribbe Beachvolleyball Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body id="status-body">
    <div class="container">
        <h1>Fribbe Beachvolleyball Status</h1>
        
        <div class="status-indicator">
            <div class="light red" id="red-light"></div>
            <div class="light yellow" id="yellow-light"></div>
            <div class="light green" id="green-light"></div>
        </div>
        
        <div class="status-message" id="status-message">
            Lade Status...
        </div>
        
        <div class="last-updated">
            Zuletzt aktualisiert: <span id="timestamp">wird geladen...</span>
        </div>
    </div>
    
    <script src="/static/js/app.js"></script>
</body>
</html>
