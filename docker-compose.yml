# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  server:
    build:
      context: .
    ports:
      - 8007:80
    volumes:
      - secrets-data:/code/secrets
      - app-data:/code/app-data
    environment:
      - ROUTER_USERNAME=${ROUTER_USERNAME}
      - ROUTER_PASSWORD=${ROUTER_PASSWORD}
      - ROUTER_IP=${ROUTER_IP:-192.168.8.1}
      - API_KEYS_PATH=${API_KEYS_PATH:-/code/secrets/apikeys.json}
      - LOCAL_DATA_PATH=${LOCAL_DATA_PATH:-/code/app-data/}
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY}
      - PRESENCE_POLLING_INTERVAL_SECONDS=${PRESENCE_POLLING_INTERVAL_SECONDS:-60}
      - PRESENCE_POLLING_DELAY_SECONDS=${PRESENCE_POLLING_DELAY_SECONDS:-0}
      - INTERNAL_POLLING_INTERVAL_SECONDS=${INTERNAL_POLLING_INTERVAL_SECONDS:-60}
      - INTERNAL_POLLING_DELAY_SECONDS=${INTERNAL_POLLING_DELAY_SECONDS:-30}
      - OCCUPANCY_POLLING_INTERVAL_SECONDS=${OCCUPANCY_POLLING_INTERVAL_SECONDS:-360}
    restart: unless-stopped

volumes:
  secrets-data:
  app-data: